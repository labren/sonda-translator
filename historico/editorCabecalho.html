<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Cabeçalhos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .station-container {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }
        .station-header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .coleta, .formatado {
            margin: 10px 0;
        }
        .coleta ul, .formatado ul {
            list-style-type: none;
            padding-left: 20px;
        }
        input[type="text"] {
            margin-right: 10px;
        }
        button {
            margin-top: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
        #file-input {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Editor de Cabeçalhos de Estações</h1>
<input type="file" id="file-input" accept=".json">
<div id="stations-container"></div>

<button id="save-btn" style="display: none;">Salvar Alterações</button>
<button id="add-station-btn" style="display: none;">Adicionar Nova Estação</button>

<script>
// Variável para armazenar o JSON
let jsonData = {};
let loadedFileName = '';

// Função para ler o arquivo JSON
function readFile(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            jsonData = JSON.parse(event.target.result);
            loadedFileName = file.name; // Guardar o nome do arquivo carregado
            displayStations();  // Exibe as estações após o arquivo ser carregado
            document.getElementById('add-station-btn').style.display = 'inline-block'; // Mostrar botão "Adicionar Nova Estação"
            document.getElementById('save-btn').style.display = 'inline-block'; // Mostrar botão "Salvar Alterações"
        } catch (e) {
            alert("Erro ao carregar o arquivo JSON: " + e.message);
        }
    };
    reader.readAsText(file);
}

// Função para exibir as estações com a opção de mostrar/esconder
function displayStations() {
    const container = document.getElementById('stations-container');
    container.innerHTML = ''; // Limpar o conteúdo existente

    for (const station in jsonData) {
        const stationData = jsonData[station];
        const stationDiv = document.createElement('div');
        stationDiv.classList.add('station-container');
        stationDiv.id = `station-${station}`;

        const header = document.createElement('div');
        header.classList.add('station-header');
        header.innerText = `Estação: ${station}`;
        stationDiv.appendChild(header);

        // Toggle para mostrar/ocultar os dados da estação
        const toggleButton = document.createElement('button');
        toggleButton.innerText = 'Mostrar/Esconder Dados';
        toggleButton.onclick = () => {
            const stationContent = document.getElementById(`station-${station}-data`);
            stationContent.style.display = stationContent.style.display === 'none' ? 'block' : 'none';
        };
        stationDiv.appendChild(toggleButton);

        // Div que conterá os dados da estação
        const stationDataDiv = document.createElement('div');
        stationDataDiv.id = `station-${station}-data`;
        stationDataDiv.style.display = 'none'; // Começar escondido

        // Coleta e Formatado para cada tipo (SD, MD, TD, 50, etc)
        Object.keys(stationData.coleta).forEach(type => {
            const coletaDiv = createColetaFormatadoSection(`Coleta ${type}`, stationData.coleta[type], station, 'coleta', type);
            stationDataDiv.appendChild(coletaDiv);
        });

        Object.keys(stationData.formatado).forEach(type => {
            const formatadoDiv = createColetaFormatadoSection(`Formatado ${type}`, Object.entries(stationData.formatado[type]), station, 'formatado', type, true);
            stationDataDiv.appendChild(formatadoDiv);
        });

        stationDiv.appendChild(stationDataDiv);
        container.appendChild(stationDiv);
    }
}

// Função para criar a seção de coleta e formatado (com botões para adicionar e excluir)
function createColetaFormatadoSection(title, data, station, sectionType, type, isFormatado = false) {
    const div = document.createElement('div');
    div.classList.add(isFormatado ? 'formatado' : 'coleta');

    const header = document.createElement('strong');
    header.innerText = title;
    div.appendChild(header);

    const toggleButton = document.createElement('button');
    toggleButton.innerText = 'Mostrar/Esconder Campos';
    toggleButton.onclick = () => {
        const fieldsContent = document.getElementById(`${sectionType}-${station}-${type}-fields`);
        fieldsContent.style.display = fieldsContent.style.display === 'none' ? 'block' : 'none';
    };
    div.appendChild(toggleButton);

    const ul = document.createElement('ul');
    ul.id = `${sectionType}-${station}-${type}-fields`;
    ul.style.display = 'none'; // Começar escondido

    data.forEach((item, index) => {
        const li = document.createElement('li');
        const input = document.createElement('input');
        input.type = 'text';
        input.value = isFormatado ? `${item[0]} => ${item[1]}` : item;
        li.appendChild(input);

        const editButton = document.createElement('button');
        editButton.innerText = 'Editar';
        editButton.onclick = () => {
            input.disabled = false;
        };
        li.appendChild(editButton);

        const deleteButton = document.createElement('button');
        deleteButton.innerText = 'Excluir';
        deleteButton.onclick = () => {
            data.splice(index, 1);
            displayStations(); // Atualiza a visualização após exclusão
        };
        li.appendChild(deleteButton);

        ul.appendChild(li);
    });

    const addButton = document.createElement('button');
    addButton.innerText = 'Adicionar Campo';
    addButton.onclick = () => {
        if (isFormatado) {
            data.push(["", ""]);
        } else {
            data.push("");
        }
        displayStations(); // Atualiza a visualização após adição
    };
    div.appendChild(ul);
    div.appendChild(addButton);

    return div;
}

// Função para adicionar uma nova estação
document.getElementById('add-station-btn').addEventListener('click', function() {
    const newStationName = prompt('Digite o nome da nova estação:');
    if (newStationName && !jsonData[newStationName]) {
        jsonData[newStationName] = {
            coleta: {
                SD: [],
                MD: [],
                TD: []
            },
            formatado: {
                SD: {},
                MD: {},
                TD: {}
            }
        };
        displayStations();
    } else {
        alert('Nome da estação inválido ou já existente.');
    }
});

// Função para salvar o arquivo JSON após as edições e sobrescrever o arquivo carregado
document.getElementById('save-btn').addEventListener('click', function() {
    if (!loadedFileName) {
        alert("Nenhum arquivo carregado.");
        return;
    }

    const newJson = JSON.stringify(jsonData, null, 2);
    const blob = new Blob([newJson], { type: 'application/json' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = loadedFileName; // Sobrescrever o arquivo original
    link.click();
});

// Carregar o arquivo ao selecionar
document.getElementById('file-input').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        readFile(file);
    }
});
</script>

</body>
</html>
